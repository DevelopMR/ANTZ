<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ant Sim - Phase 1</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg: #d9c7a3;
      --hud-bg: rgba(32, 24, 12, 0.82);
      --hud-text: #f4ead3;
      --accent-soft: #ffd6a1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255, 248, 225, 0.25), transparent 40%),
        linear-gradient(180deg, #e7d8bb 0%, var(--page-bg) 55%, #b89b72 100%);
      font-family: Georgia, "Times New Roman", serif;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      top: 16px;
      left: 16px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 244, 214, 0.15);
      border-radius: 12px;
      background: var(--hud-bg);
      color: var(--hud-text);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      pointer-events: none;
    }

    .hud strong {
      color: #fff5da;
    }

    .hud__accent {
      color: var(--accent-soft);
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div class="hud">
    <strong>Ant Sim</strong>
    <div class="hud__accent">Phase 4 Grasping</div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>

</html>
